<!DOCTYPE html>
<html>
<style>

body{

font-family:Segoe UI,sans-serif;
background:#eef2f7;
margin:0;
padding:25px;

}

.container{

max-width:1500px;
margin:auto;

}

.card{

background:white;
border-radius:18px;
padding:22px;
margin-bottom:22px;
box-shadow:0 10px 25px rgba(0,0,0,.08);

}

h1{

margin:0 0 20px 0;
color:#1e293b;

}

.stats{

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:18px;

margin-bottom:25px;

}

.statBox{

background:linear-gradient(
135deg,
#2563eb,
#1d4ed8
);

color:white;

padding:20px;

border-radius:16px;

font-size:26px;

font-weight:bold;

}

input,select{

padding:12px;

border:1px solid #d1d5db;

border-radius:10px;

}

button{

border:none;

border-radius:10px;

padding:12px 18px;

cursor:pointer;

font-weight:bold;

transition:.2s;

}

button:hover{

transform:translateY(-2px);

}

.blue{

background:#2563eb;
color:white;

}

.red{

background:#dc2626;
color:white;

}

.green{

background:#16a34a;
color:white;

}

table{

width:100%;

border-collapse:collapse;

overflow:hidden;

border-radius:14px;

}

th{

background:#2563eb;
color:white;
padding:14px;

}

td{

padding:12px;

background:white;

border-bottom:1px solid #e5e7eb;

}

.controlGrid{

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(240px,1fr));

gap:18px;

}

.controlCard{

background:white;

padding:18px;

border-radius:16px;

box-shadow:0 6px 18px rgba(0,0,0,.08);

}

.statusBtn{

width:100%;

margin-top:15px;

font-size:16px;

}

</style>
<head>

<title>CBT Monitoring</title>

<style>

body{
font-family:Arial;
padding:20px;
background:#f4f6f9;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

input,select,button{

padding:10px;
margin:10px;

}
  button{

background:#1565C0;
color:white;
border:none;
cursor:pointer;
border-radius:6px;

}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
}

th{
background:#1565C0;
color:white;
}

.online{
color:green;
font-weight:bold;
}

.ujian{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>
🚀 CBT Monitoring Realtime
</h1>

<div class="stats">

<div class="statBox">

ONLINE :
<span id="onlineCount">
0
</span>

</div>

</div>

<div class="card">

<input
id="searchInput"
placeholder="Cari Username/Nama">

<select id="kelasFilter">

<option>
Semua Kelas
</option>

</select>

<button
class="blue"
onclick="exportCSV()">

Export CSV

</button>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>Username</th>
<th>Nama</th>
<th>Kelas</th>
<th>Status</th>
<th>Mapel</th>
<th>Waktu</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<div class="card">

<h2>
🚀 PANEL CONTROL UJIAN
</h2>

<div style="margin-bottom:20px;">

<button
class="green"
onclick="openAllExam()">

BUKA SEMUA

</button>

<button
class="red"
onclick="closeAllExam()">

TUTUP SEMUA

</button>

</div>

<div
class="controlGrid"
id="controlPanel">

</div>

</div>

</div>

<script type="module"
src="firebase.js">
</script>

</body>
