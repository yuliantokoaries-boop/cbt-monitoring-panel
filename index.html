<body>

<div class="container">

<h1>
🚀 CBT Monitoring Realtime
</h1>

<div class="stats">

<div class="statBox">

ONLINE :
<span id="onlineCount">
0
</span>

</div>

</div>


<!-- PANEL CONTROL PINDAH KE ATAS -->

<div class="card">

<h2>
🚀 PANEL CONTROL UJIAN
</h2>

<div style="margin-bottom:20px;">

<button
class="green"
onclick="openAllExam()">

BUKA SEMUA

</button>

<button
class="red"
onclick="closeAllExam()">

TUTUP SEMUA

</button>

</div>

<div
class="controlGrid"
id="controlPanel">

</div>

</div>


<!-- FILTER -->

<div class="card">

<input
id="searchInput"
placeholder="Cari Username/Nama">

<select id="kelasFilter">

<option>

Semua Kelas

</option>

</select>

<button
class="blue"
onclick="exportCSV()">

Export CSV

</button>

</div>


<!-- TABLE -->

<div class="card">

<table>

<thead>

<tr>

<th>Username</th>
<th>Nama</th>
<th>Kelas</th>
<th>Status</th>
<th>Mapel</th>
<th>Waktu</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>

<script
type="module"
src="firebase.js">

</script>

</body>
