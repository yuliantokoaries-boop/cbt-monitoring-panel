<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>CBT Monitoring</title>

<style>

body{

font-family:'Segoe UI',sans-serif;
background:#eef2f7;
margin:0;
padding:25px;

}

.container{

max-width:1500px;
margin:auto;

}

.card{

background:white;
padding:22px;

border-radius:18px;

margin-bottom:22px;

box-shadow:
0 10px 25px rgba(0,0,0,.08);

}

h1,h2{

margin:0 0 20px 0;
color:#1e293b;

}

.stats{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:20px;

margin-bottom:20px;

}

.statBox{

background:
linear-gradient(
135deg,
#2563eb,
#1d4ed8
);

color:white;

padding:20px;

border-radius:18px;

font-size:26px;

font-weight:bold;

}

input,select{

padding:12px;

border:1px solid #d1d5db;

border-radius:10px;

margin-right:10px;

}

button{

padding:12px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

color:white;

transition:.2s;

}

button:hover{

transform:translateY(-2px);

}

.blue{

background:#2563eb;

}

.green{

background:#16a34a;

}

.red{

background:#dc2626;

}

table{

width:100%;

border-collapse:collapse;

overflow:hidden;

border-radius:14px;

}

th{

background:#2563eb;

color:white;

padding:14px;

}

td{

padding:12px;

background:white;

border-bottom:1px solid #e5e7eb;

}

.controlGrid{

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(220px,1fr));

gap:18px;

}

.controlCard{

background:#f8fafc;

padding:18px;

border-radius:16px;

box-shadow:
0 6px 18px rgba(0,0,0,.08);

}

.statusBtn{

width:100%;

margin-top:15px;

font-size:16px;

}

</style>

</head>

<body>

<div class="container">

<h1>
🚀 CBT Monitoring Realtime
</h1>

<div class="stats">

<div class="statBox">

ONLINE :
<span id="onlineCount">

0

</span>

</div>

</div>


<!-- PANEL CONTROL -->

<div class="card">

<h2>
🚀 PANEL CONTROL UJIAN
</h2>

<div style="margin-bottom:20px;">

<button
class="green"
onclick="openAllExam()">

BUKA SEMUA

</button>

<button
class="red"
onclick="closeAllExam()">

TUTUP SEMUA

</button>

</div>

<div
id="controlPanel"
class="controlGrid">

</div>

</div>


<!-- FILTER -->

<div class="card">

<input
id="searchInput"
placeholder="Cari Username/Nama">

<select id="kelasFilter">

<option>

Semua Kelas

</option>

</select>

<button
class="blue"
onclick="exportCSV()">

Export CSV

</button>

</div>


<!-- TABLE -->

<div class="card">

<table>

<thead>

<tr>

<th>Username</th>
<th>Nama</th>
<th>Kelas</th>
<th>Status</th>
<th>Mapel</th>
<th>Waktu</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>

<script
type="module"
src="firebase.js">

</script>

</body>
</html>
