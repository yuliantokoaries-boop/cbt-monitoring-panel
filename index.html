<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CBT Monitoring</title>

<link rel="icon" href="data:,">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI,sans-serif;
background:#eef2f7;
padding:25px;
}

.container{
max-width:1500px;
margin:auto;
}

h1,h2{
color:#1e293b;
margin-bottom:18px;
}

.card{
background:white;
padding:24px;
border-radius:18px;
margin-bottom:22px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.statBox{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
padding:22px;
border-radius:18px;
font-size:28px;
font-weight:bold;
}

input,select{
padding:12px;
border:1px solid #d1d5db;
border-radius:10px;
margin-right:10px;
margin-bottom:10px;
}

button{
border:none;
cursor:pointer;
padding:12px 18px;
border-radius:10px;
font-weight:bold;
color:white;
}

.blue{
background:#2563eb;
}

.green{
background:#16a34a;
}

.red{
background:#dc2626;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2563eb;
color:white;
padding:14px;
}

td{
padding:12px;
border-bottom:1px solid #e5e7eb;
}

.controlGrid{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(220px,1fr));
gap:18px;
}

.controlCard{
background:#f8fafc;
padding:18px;
border-radius:16px;
box-shadow:0 4px 14px rgba(0,0,0,.08);
}

.statusBtn{
width:100%;
margin-top:14px;
}

#uploadStatus{
margin-top:15px;
font-weight:bold;
color:#16a34a;
}

</style>

</head>

<body>

<div class="container">

<h1>

🚀 CBT Monitoring Realtime

</h1>


<!-- ONLINE -->

<div class="card">

<div class="statBox">

ONLINE :

<span id="onlineCount">

0

</span>

</div>

</div>


<!-- PANEL CONTROL -->

<div class="card">

<h2>

🚀 PANEL CONTROL UJIAN

</h2>

<button
class="green"
onclick="openAllExam()">

BUKA SEMUA

</button>

<button
class="red"
onclick="closeAllExam()">

TUTUP SEMUA

</button>

<br><br>

<div
id="controlPanel"
class="controlGrid">

</div>

</div>


<!-- UPLOAD PESERTA -->

<div class="card">

<h2>

📥 UPLOAD PESERTA CSV

</h2>

<p style="margin-bottom:15px;">

Format:

username,nama,kelas,agama

</p>

<input
type="file"
id="csvFile"
accept=".csv">

<button
class="green"
onclick="uploadPeserta()">

UPLOAD CSV

</button>

<div id="uploadStatus">

</div>

</div>


<!-- FILTER -->

<div class="card">

<input
id="searchInput"
placeholder="Cari Username / Nama">

<select id="kelasFilter">

<option>

Semua Kelas

</option>

</select>

<button
class="blue"
onclick="exportCSV()">

Export CSV

</button>

</div>


<!-- TABLE -->

<div class="card">

<table>

<thead>

<tr>

<th>Username</th>
<th>Nama</th>
<th>Kelas</th>
<th>Status</th>
<th>Mapel</th>
<th>Waktu</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>

<script
type="module"
src="firebase.js">

</script>

</body>

</html>
